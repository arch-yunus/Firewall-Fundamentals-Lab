version: '3.8'

services:
  # Firewall: Ağ trafiğini denetleyen ana düğüm
  firewall:
    build: ./firewall
    container_name: lab-firewall
    cap_add:
      - NET_ADMIN
    networks:
      external_net:
        ipv4_address: 10.0.2.1
      internal_net:
        ipv4_address: 10.0.1.1
    command: /bin/sh -c "sysctl -w net.ipv4.ip_forward=1 && tail -f /dev/null"

  # Client: Dış ağdan gelen talepleri simüle eden düğüm
  client:
    image: alpine:latest
    container_name: lab-client
    networks:
      external_net:
        ipv4_address: 10.0.2.10
    command: /bin/sh -c "apk add --no-cache curl nmap && tail -f /dev/null"

  # Server: İç ağdaki güvenli web sunucusu
  server:
    image: nginx:alpine
    container_name: lab-server
    networks:
      internal_net:
        ipv4_address: 10.0.1.10

networks:
  external_net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.0.2.0/24
  internal_net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.0.1.0/24
